name: 自动编译 WinUI 3 应用

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 .NET 环境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: 恢复项目依赖
      run: dotnet restore HaloPixelToolBox/HaloPixelToolBox.Core/HaloPixelToolBox.Core.csproj

    - name: 执行编译与发布
      # 这一次我们精准定位到该 csproj 文件进行编译
      run: dotnet publish HaloPixelToolBox/HaloPixelToolBox.Core/HaloPixelToolBox.Core.csproj -c Release -r win-x64 --self-contained true -o ./output_folder

    - name: 上传编译结果
      uses: actions/upload-artifact@v4
      with:
        name: 编译完成的软件包
        path: ./output_folder
