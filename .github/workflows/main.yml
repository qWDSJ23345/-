name: 自动编译 WinUI 3 应用

# 当代码推送到主分支，或者手动点击按钮时触发编译
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 核心：直接使用微软官方预装好所有环境的 Windows 服务器
    runs-on: windows-latest 

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 .NET 环境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 如果你的项目是 .NET 6 或 7，请修改这里

    - name: 恢复项目依赖 (NuGet包)
      run: dotnet restore

    - name: 执行编译与发布
      # 【这里已修正：由 win10-x64 改为了 win-x64】
      run: dotnet publish -c Release -r win-x64 --self-contained true -o ./output_folder

    - name: 上传编译结果供下载
      uses: actions/upload-artifact@v4
      with:
        name: 编译完成的软件包 # 下载时的压缩包名称
        path: ./output_folder # 将这个文件夹打包给用户下载
